<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineworld Official - Streaming</title>
    <!-- CSS සම්බන්ධ කිරීම -->
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome Icons සඳහා -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 🔐 1. ලොගින් කාඩ් එක (මුලින්ම පෙනෙන්නේ මේක) -->
    <div class="card" id="auth-container">
        <h1>Cineworld</h1>
        <p>වීඩියෝ සහ චිත්‍රපට නැරඹීම සඳහා කරුණාකර ඔබගේ ගිණුමකින් ලොග් වන්න.</p>
        
        <div class="login-buttons">
            <button id="google-btn" class="btn btn-google"><i class="fab fa-google"></i> Continue with Google</button>
            <button id="facebook-btn" class="btn btn-facebook"><i class="fab fa-facebook-f"></i> Continue with Facebook</button>
            <button id="twitter-btn" class="btn btn-twitter"><i class="fab fa-twitter"></i> Continue with X / Twitter</button>
        </div>
    </div>

    <!-- 🍿 2. NETFLIX LOOK ප්‍රධාන පිටුව (ලොග් වූ පසු පෙනේ) -->
    <div class="main-content" id="main-content" style="display: none;">
        
        <!-- Navbar -->
        <header>
            <div class="logo">Cineworld</div>
            <div id="user-profile">
                <!-- මෙතනට තමයි User Photo එකයි Logout බටන් එකයි වැටෙන්නේ -->
            </div>
        </head>

        <!-- Netflix Hero Banner -->
        <div class="hero-banner" id="hero-banner">
            <div class="hero-contents">
                <h1 id="hero-title">Featured Movie</h1>
                <p id="hero-description">Loading featured movie description...</p>
                <div class="hero-buttons">
                    <button class="hero-btn play"><i class="fas fa-play"></i> Play</button>
                    <button class="hero-btn info"><i class="fas fa-info-circle"></i> More Info</button>
                </div>
            </div>
            <div class="hero-fade-bottom"></div>
        </div>

        <!-- Movie Rows (චිත්‍රපට පේළි) -->
        <main class="movies-section">
            <h2 class="row-title">Trending Movies</h2>
            <div class="movies-row" id="trending-row">
                <!-- JavaScript මඟින් චිත්‍රපට ඔටෝමැටිකව මෙතනට වැටේ -->
            </div>

            <h2 class="row-title">Top Rated Classics</h2>
            <div class="movies-row" id="top-rated-row">
                <!-- JavaScript මඟින් චිත්‍රපට ඔටෝමැටිකව මෙතනට වැටේ -->
            </div>
        </main>
    </div>

    <!-- JavaScript මොඩියුලය සම්බන්ධ කිරීම -->
    <script type="module" src="script.js"></script>
</body>
                                                        </html>
