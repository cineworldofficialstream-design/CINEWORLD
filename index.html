<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineworld Official - Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="card" id="auth-container">
        <h1>Cineworld</h1>
        <p>වීඩියෝ සහ චිත්‍රපට නැරඹීම සඳහා කරුණාකර ඔබගේ ගිණුමකින් ලොග් වන්න.</p>
        
        <div class="login-buttons">
            <button id="google-btn" class="btn btn-google"><i class="fab fa-google"></i> Continue with Google</button>
            <button id="facebook-btn" class="btn btn-facebook"><i class="fab fa-facebook-f"></i> Continue with Facebook</button>
            <button id="twitter-btn" class="btn btn-twitter"><i class="fab fa-twitter"></i> Continue with X / Twitter</button>
        </div>
    </div>

    <div class="main-content" id="main-content" style="display: none;">
        <header>
            <h2>Cineworld Streaming</h2>
            <div id="user-profile"></div>
        </header>
        <main>
            <div class="welcome-box">
                <h3>සාදරයෙන් පිළිගනිමු!</h3>
                <p>ඔබ දැන් සාර්ථකව ලොග් වී ඇත. දැන් ඔබට චිත්‍රපට නැරඹිය හැකිය.</p>
            </div>
            </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
    </html>
